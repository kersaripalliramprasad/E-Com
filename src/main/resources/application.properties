


server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ===============================================
# POSTGRESQL DATABASE CONFIGURATION (PERMANENT)
# ===============================================

# 1. The Database URL
# This tells Spring Boot to connect to your permanent PostgreSQL server.
# Make sure you have created a database named 'ecom_db' in pgAdmin.
#spring.datasource.url=jdbc:postgresql://localhost:5432/Vcom_DB
#spring.datasource.username=postgres
#
#
#spring.datasource.password=Vinay@777
#
## 3. Hibernate (JPA) Configuration
## This tells Hibernate to use the correct SQL "language" for PostgreSQL.
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#
## 'update' will keep your data and only change the table structure if your code changes.
#spring.jpa.hibernate.ddl-auto=update

# Optional: This prints the SQL commands to the console. Very useful for debugging.
spring.jpa.show-sql=true



# JWT Secret Key - IMPORTANT: Use a long, randomly generated string in production
# You can generate one from sites like https://www.allkeysgenerator.com/ (use a 256-bit or 512-bit key)
application.security.jwt.secret-key=472D4B6150645367566B5970337336763979244226452948404D635165546857
# Token expiration time in milliseconds (e.g., 24 hours)
application.security.jwt.expiration=86400000
# ===============================================
# FILE UPLOAD SETTINGS (These stay the same)
# ===============================================
# Set max individual file size to 10MB
spring.servlet.multipart.max-file-size=10MB
# Set max total request size (including all files) to 10MB
spring.servlet.multipart.max-request-size=10MB
server.forward-headers-strategy=framework

